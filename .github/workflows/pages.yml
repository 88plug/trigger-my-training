name: Deploy MkDocs to GitHub Pages
# One-time setup: gh api -X POST repos/88plug/trigger-my-training/pages -f build_type=workflow
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/configure-pages@v6.0.0
        with:
          enablement: true
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site
  deploy:
    needs: build
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
